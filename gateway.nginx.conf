# =========================================================================
# Matrix Matrimony - Ultra-Secure Nginx Production Gateway (SSL Enabled)
# Domain: brideandgroom.co.in | Version: 2.0.0
# =========================================================================

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  2048;
}

http {
    access_log /dev/stdout;
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    
    resolver 127.0.0.11 valid=30s;

    # Performance & Security Optimizations
    sendfile        on;
    tcp_nopush     on;
    tcp_nodelay    on;
    keepalive_timeout  65;
    server_tokens off;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types 
        text/plain 
        text/css 
        text/javascript 
        application/javascript 
        application/x-javascript 
        application/json 
        application/xml 
        application/xml+rss 
        image/svg+xml 
        application/vnd.ms-fontobject 
        application/x-font-ttf 
        font/opentype;

    # Tuning for High Performance
    proxy_buffers 16 16k;
    proxy_buffer_size 32k;
    proxy_busy_buffers_size 64k;

    # --- Security: Rate Limiting ---
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=1r/s;

    # -------------------------------------------------------------------------
    # 0. Global Redirect: HTTP -> HTTPS
    # -------------------------------------------------------------------------
    server {
        listen 80;
        server_name brideandgroom.co.in www.brideandgroom.co.in admin.brideandgroom.co.in api.brideandgroom.co.in storage.brideandgroom.co.in console.brideandgroom.co.in;

        # Health check and SSL challenge
        location /.well-known/acme-challenge/ {
            alias /var/www/certbot/.well-known/acme-challenge/;
            allow all;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # -------------------------------------------------------------------------
    # SSL Common Configuration Template
    # -------------------------------------------------------------------------
    # IMPORTANT: Ensure Certbot is run before using this config in Production
    ssl_certificate /etc/letsencrypt/live/brideandgroom.co.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/brideandgroom.co.in/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # -------------------------------------------------------------------------
    # 1. Main Platform: HTTPS
    # -------------------------------------------------------------------------
    server {
        listen 443 ssl;
        http2 on;
        server_name brideandgroom.co.in www.brideandgroom.co.in;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-XSS-Protection "1; mode=block";
        add_header X-Content-Type-Options "nosniff";

        location / {
            set $upstream_frontend frontend;
            proxy_pass http://$upstream_frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # Cache standard assets at gateway level
        location ~* \.(?:ico|css|js|gif|jpe?g|png|svg|woff2?|eot|ttf|mp4)$ {
            set $upstream_frontend_static frontend;
            proxy_pass http://$upstream_frontend_static:3000;
            expires 7d;
            add_header Cache-Control "public, no-transform";
            add_header X-Asset-Cache "HIT-GATEWAY";
        }
    }

    # -------------------------------------------------------------------------
    # 2. Admin Portal: HTTPS
    # -------------------------------------------------------------------------
    server {
        listen 443 ssl;
        http2 on;
        server_name admin.brideandgroom.co.in;

        location / {
            set $upstream_admin_frontend admin-frontend;
            proxy_pass http://$upstream_admin_frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }

    # -------------------------------------------------------------------------
    # 3. Public API: HTTPS
    # -------------------------------------------------------------------------
    server {
        listen 443 ssl;
        http2 on;
        server_name api.brideandgroom.co.in;
        client_max_body_size 50M;

        location /api/auth {
            limit_req zone=auth_limit burst=5 nodelay;
            set $upstream_backend backend;
            proxy_pass http://$upstream_backend:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location /api/admin {
            limit_req zone=api_limit burst=20 nodelay;
            set $upstream_admin_backend admin-backend;
            proxy_pass http://$upstream_admin_backend:5001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location /api {
            limit_req zone=api_limit burst=20 nodelay;
            set $upstream_backend backend;
            proxy_pass http://$upstream_backend:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }

    # -------------------------------------------------------------------------
    # 5. Object Storage (Console & S3): HTTPS
    # -------------------------------------------------------------------------
    server {
        listen 443 ssl;
        http2 on;
        server_name storage.brideandgroom.co.in;
        location / {
            set $upstream_minio_s3 minio;
            proxy_pass http://$upstream_minio_s3:9000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto https;
        }
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name console.brideandgroom.co.in;
        location / {
            set $upstream_minio minio;
            proxy_pass http://$upstream_minio:9001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto https;
        }
    }
}
