services:
  # Main Database
  mariadb:
    image: mariadb:10.11
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: matrimony
      MARIADB_USER: matrimony_user
      MARIADB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - matrimony_network

  # Cache & Session Store
  redis:
    image: redis:7.4-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "$${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - matrimony_network

  # Object Storage
  minio:
    image: minio/minio:latest
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    # ports:
    #   - "9000:9000" # MinIO API
    #   - "9001:9001" # MinIO Console
    expose:
      - "9000"
      - "9001"
    env_file:
      - .env
    volumes:
      - minio_data:/data
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.matrimony-storage.rule=Host(`storage.brideandgroom.co.in`)"
      - "traefik.http.routers.matrimony-storage.entrypoints=websecure"
      - "traefik.http.routers.matrimony-storage.tls=true"
      - "traefik.http.routers.matrimony-storage.tls.certresolver=letsencrypt"
      - "traefik.http.routers.matrimony-storage.service=matrimony-storage"
      - "traefik.http.services.matrimony-storage.loadbalancer.server.port=9000"
      - "traefik.http.routers.matrimony-console.rule=Host(`console.brideandgroom.co.in`)"
      - "traefik.http.routers.matrimony-console.entrypoints=websecure"
      - "traefik.http.routers.matrimony-console.tls=true"
      - "traefik.http.routers.matrimony-console.tls.certresolver=letsencrypt"
      - "traefik.http.routers.matrimony-console.service=matrimony-console"
      - "traefik.http.services.matrimony-console.loadbalancer.server.port=9001"
    networks:
      - matrimony_network
      - traefik-public

  # Main Backend
  backend:
    image: maheshbadgujar2408/matrimony-backend:latest
    build:
      context: ./Backend
    restart: always
    deploy:
      replicas: 2 # Horizontal Scaling: Dedicated redundancy for high-volume traffic
      restart_policy:
        condition: on-failure
    # ports:
    #   - "5000:5000" # Isolated behind Nginx (gateway:80)
    expose:
      - "5000"
    env_file:
      - .env
    environment:
      - PORT=5000
      - DB_HOST=mariadb
      - REDIS_URL=${REDIS_URL}
      - MINIO_ENDPOINT=minio
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - REFRESH_TOKEN_SECRET=${REFRESH_TOKEN_SECRET}
      - FRONTEND_URL=${FRONTEND_URL}
      - EMAIL_HOST=${EMAIL_HOST}
      - EMAIL_PORT=${EMAIL_PORT}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
      - MINIO_PORT=${MINIO_PORT}
      - MINIO_USE_SSL=${MINIO_USE_SSL}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=${MINIO_BUCKET}
      - MINIO_KYC_BUCKET=${MINIO_KYC_BUCKET}
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - matrimony_network
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.matrimony-api.rule=Host(`api.brideandgroom.co.in`) && !PathPrefix(`/api/admin`)"
      - "traefik.http.routers.matrimony-api.entrypoints=websecure"
      - "traefik.http.routers.matrimony-api.tls=true"
      - "traefik.http.routers.matrimony-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.matrimony-api.loadbalancer.server.port=5000"

  # Main Frontend
  frontend:
    image: maheshbadgujar2408/matrimony-frontend:latest
    restart: always
    # ports:
    #  - "3000:3000" # Isolated behind Nginx (gateway:80)
    expose:
      - "3000"
    env_file:
      - .env
    build:
      context: ./Frontend
      args:
        - VITE_API_URL=${VITE_API_URL}
        - VITE_UMAMI_URL=${VITE_UMAMI_URL}
        - VITE_UMAMI_WEBSITE_ID=${VITE_UMAMI_WEBSITE_ID}
        - VITE_STORAGE_URL=${VITE_STORAGE_URL}
        - VITE_MINIO_URL=${VITE_MINIO_URL}
        - VITE_PLATFORM_NAME=${PLATFORM_NAME}
        - VITE_PLATFORM_DOMAIN=${PLATFORM_DOMAIN}
        - VITE_SUPPORT_EMAIL=${SUPPORT_EMAIL}
    depends_on:
      - backend
    networks:
      - matrimony_network
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.matrimony-frontend.rule=Host(`brideandgroom.co.in`) || Host(`www.brideandgroom.co.in`)"
      - "traefik.http.routers.matrimony-frontend.entrypoints=websecure"
      - "traefik.http.routers.matrimony-frontend.tls=true"
      - "traefik.http.routers.matrimony-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.matrimony-frontend.loadbalancer.server.port=3000"

  # Admin Backend
  admin-backend:
    image: maheshbadgujar2408/matrimony-admin-backend:latest
    build:
      context: ./Admin/Backend
    restart: always
    # ports:
    #   - "5001:5001" # Isolated behind Nginx (gateway:80)
    expose:
      - "5001"
    env_file:
      - .env
    environment:
      - PORT=5001
      - DB_HOST=mariadb
      - REDIS_URL=${REDIS_URL}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_JWT_SECRET=${ADMIN_JWT_SECRET}
      - ADMIN_SETUP_TOKEN=${ADMIN_SETUP_TOKEN}
      - ADMIN_RATE_LIMIT_MAX=${ADMIN_RATE_LIMIT_MAX}
      - ADMIN_LOGIN_LIMIT_MAX=${ADMIN_LOGIN_LIMIT_MAX}
      - EMAIL_HOST=${EMAIL_HOST}
      - EMAIL_PORT=${EMAIL_PORT}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=${MINIO_PORT}
      - MINIO_USE_SSL=${MINIO_USE_SSL}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=${MINIO_BUCKET}
      - MINIO_KYC_BUCKET=${MINIO_KYC_BUCKET}
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - matrimony_network
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.matrimony-admin-api.rule=Host(`api.brideandgroom.co.in`) && PathPrefix(`/api/admin`)"
      - "traefik.http.routers.matrimony-admin-api.entrypoints=websecure"
      - "traefik.http.routers.matrimony-admin-api.tls=true"
      - "traefik.http.routers.matrimony-admin-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.matrimony-admin-api.loadbalancer.server.port=5001"

  # Administrative Dashboard Frontend
  admin-frontend:
    image: maheshbadgujar2408/matrimony-admin-frontend:latest
    restart: always
    env_file:
      - .env
    expose:
      - "80"
    build:
      context: ./Admin/Frontend
      args:
        - VITE_ADMIN_API_URL=${VITE_ADMIN_API_URL}
        - VITE_UMAMI_URL=${VITE_UMAMI_URL}
    depends_on:
      - admin-backend
    networks:
      - matrimony_network
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.matrimony-admin-frontend.rule=Host(`admin.brideandgroom.co.in`)"
      - "traefik.http.routers.matrimony-admin-frontend.entrypoints=websecure"
      - "traefik.http.routers.matrimony-admin-frontend.tls=true"
      - "traefik.http.routers.matrimony-admin-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.matrimony-admin-frontend.loadbalancer.server.port=80"

  # 🛡️ Automated Database Backups
  db-backup:
    image: fradelg/mysql-cron-backup:1.14.2
    restart: always
    env_file:
      - .env
    environment:
      - MYSQL_HOST=mariadb
      - MYSQL_USER=root
      - MYSQL_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=matrimony
      - CRON_TIME=0 0 * * * # Backup daily at midnight
      - MAX_BACKUPS=7 # Keep last 7 backups
      - MYSQLDUMP_OPTS=--single-transaction --quick --lock-tables=false
    volumes:
      - mariadb_backups:/backup
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - matrimony_network

  # 📊 Privacy-First Analytics (Umami)
  umami:
    image: ghcr.io/umami-software/umami:latest
    restart: always
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@umami-db:5432/umami
      - APP_SECRET=${JWT_SECRET}
      - PORT=3000
    expose:
      - "3000"
    depends_on:
      umami-db:
        condition: service_healthy
    networks:
      - matrimony_network
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.matrimony-analytics.rule=Host(`analytics.brideandgroom.co.in`)"
      - "traefik.http.routers.matrimony-analytics.entrypoints=websecure"
      - "traefik.http.routers.matrimony-analytics.tls=true"
      - "traefik.http.routers.matrimony-analytics.tls.certresolver=letsencrypt"
      - "traefik.http.services.matrimony-analytics.loadbalancer.server.port=3000"

  umami-db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_DB=umami
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d umami"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - umami_data:/var/lib/postgresql/data
    networks:
      - matrimony_network

  # 🌐 Production Network Gateway (Nginx)
  gateway:
    image: nginx:1.27-alpine
    container_name: matrimony-gateway
    restart: always
    env_file:
      - .env
    # ports:
    #   - "80:80"
    #   - "443:443"
    volumes:
      - ./gateway.nginx.conf:/etc/nginx/nginx.conf:ro
      - ./logs/nginx:/var/log/nginx
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
      - admin-frontend
      - admin-backend
      - umami
    networks:
      - matrimony_network
    #   - traefik-public

networks:
  matrimony_network:
    driver: bridge
  traefik-public:
    external: true

  # 📊 Prometheus — Metrics Collection
  prometheus:
    image: prom/prometheus:v2.51.0
    restart: always
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
    expose:
      - "9090"
    depends_on:
      - backend
    networks:
      - matrimony_network

  # 📈 Grafana — Monitoring Dashboards
  grafana:
    image: grafana/grafana:10.4.0
    restart: always
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-changeme}
      - GF_SERVER_ROOT_URL=https://monitor.brideandgroom.co.in
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - grafana_data:/var/lib/grafana
    expose:
      - "3000"
    depends_on:
      - prometheus
    networks:
      - matrimony_network
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.matrimony-monitor.rule=Host(`monitor.brideandgroom.co.in`)"
      - "traefik.http.routers.matrimony-monitor.entrypoints=websecure"
      - "traefik.http.routers.matrimony-monitor.tls=true"
      - "traefik.http.routers.matrimony-monitor.tls.certresolver=letsencrypt"
      - "traefik.http.services.matrimony-monitor.loadbalancer.server.port=3000"

volumes:
  mariadb_data:
  minio_data:
  mariadb_backups:
  umami_data:
  prometheus_data:
  grafana_data:
