name: Matrix Matrimony CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # --- LINTING JOBS (Parallel) ---
  lint-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: "Backend/package-lock.json"
      - name: Lint Backend
        run: |
          cd Backend
          npm ci
          npm run lint

  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: "Frontend/package-lock.json"
      - name: Lint Frontend
        run: |
          cd Frontend
          npm ci
          npm run lint

  lint-admin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: "Admin/Frontend/package-lock.json"
      - name: Lint Admin
        run: |
          cd Admin/Frontend
          npm ci
          npm run lint

  # --- DOCKER BUILD JOBS (Parallel, Dependencies Distributed) ---
  build-backend:
    needs: lint-backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./Backend
          push: true
          tags: maheshbadgujar2408/matrimony-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    needs: lint-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./Frontend
          push: true
          tags: maheshbadgujar2408/matrimony-frontend:latest
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL || 'https://api.brideandgroom.co.in/api' }}
            VITE_PLATFORM_NAME=${{ vars.PLATFORM_NAME || 'Matrix Matrimony' }}
            VITE_PLATFORM_DOMAIN=${{ vars.PLATFORM_DOMAIN || 'brideandgroom.co.in' }}
            VITE_STORAGE_URL=${{ vars.VITE_STORAGE_URL || 'https://storage.brideandgroom.co.in' }}
            VITE_MINIO_URL=${{ vars.VITE_MINIO_URL || 'https://s3.brideandgroom.co.in' }}
            VITE_UMAMI_URL=${{ vars.VITE_UMAMI_URL || 'https://analytics.brideandgroom.co.in' }}
            VITE_UMAMI_WEBSITE_ID=${{ vars.VITE_UMAMI_WEBSITE_ID || 'matrimony-main-website' }}
            VITE_SUPPORT_EMAIL=${{ vars.SUPPORT_EMAIL || 'info@swakai.in' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-admin-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build Admin Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./Admin/Backend
          push: true
          tags: maheshbadgujar2408/matrimony-admin-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-admin-frontend:
    needs: lint-admin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build Admin Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./Admin/Frontend
          push: true
          tags: maheshbadgujar2408/matrimony-admin-frontend:latest
          build-args: |
            VITE_ADMIN_API_URL=${{ vars.VITE_ADMIN_API_URL || 'https://api.brideandgroom.co.in/api/admin' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
