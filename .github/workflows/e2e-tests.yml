name: E2E Selenium Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      chrome:
        image: selenium/standalone-chrome:latest
        ports:
          - 4444:4444
        options: --shm-size=2g

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tests/e2e/package-lock.json

      - name: Install E2E dependencies
        working-directory: tests/e2e
        run: npm ci

      - name: Run E2E tests
        working-directory: tests/e2e
        env:
          HEADLESS: 'true'
          CI: 'true'
          BASE_URL: 'http://localhost:5173'
          SELENIUM_REMOTE_URL: 'http://localhost:4444/wd/hub'
        run: npm run test:report
        continue-on-error: true

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-report
          path: tests/e2e/reports/
          retention-days: 30

      - name: Comment PR with test results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'tests/e2e/reports/ci-report.json';
            let summary = '## 🧪 E2E Test Results\n\n';
            
            try {
              const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
              const stats = report.stats;
              const passed = stats.passes || 0;
              const failed = stats.failures || 0;
              const total = stats.tests || 0;
              const icon = failed > 0 ? '❌' : '✅';
              
              summary += `${icon} **${passed}/${total} tests passed** (${failed} failed)\n`;
              summary += `⏱️ Duration: ${(stats.duration / 1000).toFixed(1)}s\n`;
            } catch {
              summary += '⚠️ Could not parse test report.\n';
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });
